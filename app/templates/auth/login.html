{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <h1 class="login-title">AcademiaLMS</h1>
    <p class="login-sub">Learning Management System</p>

    {% if error %}
    <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@university.edu"
               required autocomplete="email" class="input" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••"
               required autocomplete="current-password" class="input" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <p class="login-note">Access restricted to authorised university staff and students.</p>
  </div>
</div>
{% endblock %}
